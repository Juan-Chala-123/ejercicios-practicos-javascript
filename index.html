<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios Practicos de JavaScript</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <main>
        <div>
            <h2>1. Mostrar texto en pantalla</h2>
            <button id="btnMensaje" onclick="mensaje()">Mostrar mensaje</button>
            <p id="resultado"></p>
        </div>

        <div>
            <h2>2. Calculadora de suma</h2>
            <input type="number" name="num1" id="num1" placeholder="Numero 1">
            <input type="number" name="num2" id="num2" placeholder="Numero 2">
            <button onclick="sumar()">Sumar</button>
            <p id="resultadoSuma"></p>
        </div>

        <div>
            <h2>3. Cambiar color de fondo</h2>
            <button value="red" onclick="cambiarColor(this)">Rojo</button>
            <button value="blue" onclick="cambiarColor(this)">Azul</button>
            <button value="green" onclick="cambiarColor(this)">Verde</button>
        </div>

        <div>
            <h2>4. Contador de clics</h2>
            <input type="button" value="Clic" onclick="contador()">
            <p id="clic">Clics: 0</p>
        </div>

        <div>
            <h2>5. Lista dinámica</h2>
            <input type="text" id="text" placeholder="Ingresa una tarea">
            <input type="button" value="Agregar" onclick="lista()">
            <ul id="tarea"></ul>
        </div>

        <div>
            <h2>6. Validación de formulario</h2>
            <input type="text" id="name" placeholder="Nombre">
            <input type="text" id="email" placeholder="Correo">
            <input type="number" id="age" placeholder="Edad">
            <input type="submit" onclick="formulario()">

            <ul id="formulario"></ul>
        </div>

        <div>
            <h2>7. Calculadora básica</h2>
            <input type="number" placeholder="Numero 1" id="nume1">
            <input type="number" placeholder="Numero 2" id="nume2">
            <input type="button" value="Sumar" onclick="calculadora(this)">
            <input type="button" value="Restar" onclick="calculadora(this)">
            <input type="button" value="Dividir" onclick="calculadora(this)">
            <input type="button" value="Multiplicar" onclick="calculadora(this)">
            <div id="resultadoCalculadora"></div>
        </div>

        <div>
            <h2>8. Eliminación de elementos de lista</h2>
            <input type="text" id="text2" placeholder="Ingresa una tarea">
            <input type="button" value="Agregar" onclick="lista2()">
            <ul id="tareas">

            </ul>
        </div>

        <div>
            <h2>9. Temporizador</h2>

        <h1 id="tiempo">00:00:00</h1>

        <button onclick="iniciar()">Iniciar</button>
        <button onclick="pausar()">Pausar</button>
        <button onclick="reiniciar()">Reiniciar</button>
        </div>
    </main>
    
    <script src="./js/script.js"></script>
</body>
</html>
